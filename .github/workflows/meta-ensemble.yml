name: Meta-Ensemble Validation

on:
  push:
    branches: [main]
    paths:
      - 'pop/core/meta_ensemble.py'
      - 'pop/core/unified.py'
      - 'experiments/final_experiment.py'
  pull_request:
    branches: [main]
    paths:
      - 'pop/core/meta_ensemble.py'
      - 'pop/core/unified.py'
      - 'experiments/final_experiment.py'
  workflow_dispatch:

jobs:
  validate-meta-ensemble:
    name: Validate Meta-Ensemble Performance
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install scikit-learn numpy
      
      - name: Run Meta-Ensemble Validation
        run: |
          cd /home/runner/work/Prediction-of-Prediction/Prediction-of-Prediction
          python3 << 'PYEOF'
          import sys
          sys.path.insert(0, '.')
          import numpy as np
          import json
          from sklearn.model_selection import cross_val_score, StratifiedKFold
          from sklearn.ensemble import RandomForestClassifier
          from sklearn.metrics import roc_auc_score
          import warnings
          warnings.filterwarnings('ignore')
          
          print("="*60)
          print("META-ENSEMBLE VALIDATION")
          print("="*60)
          
          # Same data as production validation
          np.random.seed(42)
          n = 1000
          X = np.zeros((n, 9))
          y = np.zeros(n)
          for i in range(n):
              h = np.random.rand() > 0.58
              y[i] = 1 if h else 0
              if h:
                  X[i] = [np.random.beta(2,6), np.random.beta(3,4), np.random.beta(5,2),
                          np.random.beta(3,4), np.random.beta(2,5), np.random.beta(5,2),
                          np.random.beta(3,3), np.random.beta(3,3), np.random.beta(4,2)]
              else:
                  X[i] = [np.random.beta(6,2), np.random.beta(2,4), np.random.beta(2,6),
                          np.random.beta(5,2), np.random.beta(4,3), np.random.beta(2,5),
                          np.random.beta(3,3), np.random.beta(3,3), np.random.beta(3,3)]
          
          skf = StratifiedKFold(5, shuffle=True, random_state=42)
          
          # Baseline (8 features)
          X8 = X[:,:8]
          base_auc = cross_val_score(
              RandomForestClassifier(n_estimators=300, max_depth=8, random_state=42),
              X8, y, cv=skf, scoring='roc_auc'
          ).mean()
          
          # Meta-ensemble (from actual module)
          from pop.core.meta_ensemble import PoPMetaEnsemble
          
          m_scores = []
          for ti, tei in skf.split(X, y):
              m = PoPMetaEnsemble(random_state=42)
              m.fit(X[ti], y[ti], cv_folds=3)
              p = m.predict_proba(X[tei])
              m_scores.append(roc_auc_score(y[tei], p))
          
          meta_auc = np.mean(m_scores)
          
          print(f"\nBaseline (8 features):     {base_auc:.4f}")
          print(f"Meta-Ensemble (9 feats):   {meta_auc:.4f}")
          print(f"Improvement:               +{meta_auc - base_auc:.4f}")
          
          # Verify against expected
          with open('experiments/final_results.json') as f:
              expected = json.load(f)
          
          print(f"\nExpected (from validation): {expected['best_auc']}")
          
          if meta_auc >= 0.75:
              print("\n✅ Meta-ensemble VALIDATED")
              sys.exit(0)
          else:
              print("\n❌ Meta-ensemble FAILED")
              sys.exit(1)
          PYEOF
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: meta-ensemble-results
          path: experiments/final_results.json
