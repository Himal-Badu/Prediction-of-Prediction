name: PoP CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flake8
      - name: Check Python syntax
        run: flake8 pop/ --max-line-length=120 --ignore=E501,W503 || true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: |
          PYTHONPATH=. pytest tests/ -v || echo "No tests yet — see issue #4"

  smoke-test:
    name: Smoke Test (Load Model + Predict)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Smoke test
        run: |
          python3 -c "
          import torch
          import sys
          sys.path.insert(0, '.')
          
          # Test 1: Import all modules
          from pop.core.llm_base import LLMBase
          from pop.core.pop_layer_llm import PoPLayerLLM, LLMErrorPredictor
          from pop.core.pop_v2 import PoPLayerLLMV2
          from pop.core.integration import PoPIntegration
          print('✓ All imports successful')
          
          # Test 2: Create PoP v1 model
          model = LLMErrorPredictor(vocab_size=50257)
          print(f'✓ PoP v1 created: {sum(p.numel() for p in model.parameters())} params')
          
          # Test 3: Forward pass
          logits = torch.randn(1, 50257)
          probs = torch.softmax(logits, dim=-1)
          out = model(logits, probs)
          assert 'error_magnitude' in out
          assert 'confidence' in out
          print('✓ Forward pass works')
          
          # Test 4: Feature extraction
          features = model.extract_features(logits, probs)
          assert features.shape == (1, 16), f'Expected (1,16), got {features.shape}'
          print('✓ Feature extraction works (16 features)')
          
          # Test 5: PoP v2 model
          model_v2_wrapper = PoPLayerLLMV2(vocab_size=50257, device='cpu')
          model_v2 = model_v2_wrapper.model
          feat_v2 = torch.randn(1, 24)
          out_v2 = model_v2(feat_v2)
          assert 'error_magnitude' in out_v2
          print(f'✓ PoP v2 created: {sum(p.numel() for p in model_v2.parameters())} params')
          
          # Test 6: Load training data
          import numpy as np
          data = np.load('training_data.npy', allow_pickle=True).item()
          assert data['features'].shape[1] == 16
          assert len(data['labels']) == data['features'].shape[0]
          print(f'✓ Training data loaded: {data[\"features\"].shape[0]} samples, {data[\"features\"].shape[1]} features')
          
          print('\\n✅ All smoke tests passed!')
          "

  benchmark-check:
    name: Benchmark Validation
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Quick benchmark (5 prompts)
        run: |
          python3 -c "
          import torch, sys, numpy as np
          sys.path.insert(0, '.')
          from pop.core.llm_base import create_llm
          from pop.core.pop_layer_llm import create_pop_llm
          
          print('Running quick benchmark...')
          llm = create_llm('distilgpt2', device='cpu')
          pop = create_pop_llm(vocab_size=llm.vocab_size, device='cpu')
          
          prompts = ['The capital of France is', 'Water is', 'The sky is', 'Hello', '1 + 1']
          for p in prompts:
              logits = llm.get_logits(p)
              probs = torch.softmax(logits, dim=-1)
              result = pop.predict(logits.unsqueeze(0), probs.unsqueeze(0))
              print(f'  \"{p}\" → error: {result[\"error_magnitude\"]:.3f}, confidence: {result[\"confidence\"]:.3f}')
          
          print('✓ Benchmark completed successfully')
          " || echo "Benchmark skipped (model download may take time)"
